<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Dojo - Dojo Temple</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <style>      *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
            linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
            url("{% static 'images/fondo-pagina.png' %}");

            background-size:cover;
            background-position:center;

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Roboto', sans-serif;
            color:white;
        }
</style>
</head>
<script>

function togglePassword(inputId, button){

    const input = document.getElementById(inputId);

    const icon = button.querySelector('i');

    if(input.type === 'password'){

        input.type = 'text';

        icon.classList.remove('fa-eye');

        icon.classList.add('fa-eye-slash');

    }else{

        input.type = 'password';

        icon.classList.remove('fa-eye-slash');

        icon.classList.add('fa-eye');
    }
}

</script>
<body>

<a href="/" class="volver">
    <i class="fas fa-arrow-left"></i> Volver
</a>

<div class="login-container">

    <div class="login-card">

        <div class="logo">
            <img src="{% static 'images/logo-dojo.png' %}" alt="Dojo Temple">
        </div>

        <h1 class="titulo">
            ENTRAR AL DOJO
        </h1>

        <p class="subtitulo">
            El campo de batalla espera al guerrero.
        </p>

        <form method="POST">

            {% csrf_token %}

            {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <div class="mb-4">

                <label class="form-label">
                    Usuario
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Ingresa tu nombre de guerrero"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Contraseña
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        name="password"
                        id="loginPassword"
                        class="form-control dojo-input"
                        placeholder="Ingresa tu contraseña"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePassword('loginPassword', this)"
                    >

                        <i class="fas fa-eye"></i>

                    </button>

                </div>

            </div>

            <button type="submit" class="btn-dojo">

                <i class="fas fa-fire"></i>
                Iniciar Sesión

            </button>

        </form>

        <div class="registro-link">

            ¿Aún no eres guerrero?

            <a href="{% url 'registro' %}">
                Únete al Dojo
            </a>

        </div>

    </div>

</div>

</body>
</html>
