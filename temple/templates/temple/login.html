<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Dojo - Dojo Temple</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
            linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
            url('/static/images/FONDO PAGINA.png');

            background-size:cover;
            background-position:center;

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Roboto', sans-serif;
            color:white;
        }

        .login-container{
            width:100%;
            max-width:500px;
            padding:2rem;
        }

        .login-card{

            background:rgba(15,15,15,0.95);

            border:2px solid rgba(255,69,0,0.4);

            border-radius:20px;

            padding:3rem;

            box-shadow:
            0 0 30px rgba(255,69,0,0.3),
            0 0 60px rgba(255,69,0,0.15);

            backdrop-filter:blur(10px);
        }

        .logo{
            text-align:center;
            margin-bottom:2rem;
        }

        .logo img{
            width:120px;
            filter:drop-shadow(0 0 20px #ff4500);
        }

        .titulo{
            text-align:center;
            font-family:'Bebas Neue', sans-serif;
            font-size:3rem;
            letter-spacing:3px;
            color:#ff4500;
            margin-bottom:0.5rem;

            text-shadow:
            0 0 10px #ff4500,
            0 0 30px #ff2200;
        }

        .subtitulo{
            text-align:center;
            color:#ccc;
            margin-bottom:2rem;
        }

        .form-label{
            color:#ff4500;
            font-weight:bold;
            margin-bottom:0.6rem;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        .form-control{

            background:#111;
            border:2px solid rgba(255,69,0,0.2);

            color:white;

            padding:1rem;
            border-radius:10px;

            transition:0.3s;
        }

        .form-control:focus{

            background:#111;
            color:white;

            border-color:#ff4500;

            box-shadow:
            0 0 10px rgba(255,69,0,0.5),
            0 0 20px rgba(255,69,0,0.3);
        }

        .btn-dojo{

            width:100%;

            padding:1rem;

            border:none;

            border-radius:10px;

            background:
            linear-gradient(135deg,#ff4500,#ff2200);

            color:white;

            font-weight:700;

            text-transform:uppercase;

            letter-spacing:2px;

            transition:0.3s;
        }

        .btn-dojo:hover{

            transform:translateY(-3px);

            box-shadow:
            0 0 20px rgba(255,69,0,0.8),
            0 0 40px rgba(255,69,0,0.4);
        }

        .registro-link{

            text-align:center;
            margin-top:2rem;
            color:#ccc;
        }

        .registro-link a{

            color:#ff4500;
            text-decoration:none;
            font-weight:bold;
        }

        .registro-link a:hover{
            text-shadow:0 0 10px #ff4500;
        }

        .volver{

            position:absolute;
            top:30px;
            left:30px;

            color:white;
            text-decoration:none;

            border:2px solid #ff4500;

            padding:0.8rem 1.2rem;

            border-radius:10px;

            transition:0.3s;
        }

        .volver:hover{

            background:#ff4500;

            color:white;

            box-shadow:0 0 20px rgba(255,69,0,0.7);
        }

        .errorlist{

            list-style:none;
            padding:0;

            color:#ff5c5c;

            margin-bottom:1rem;
        }
        .password-wrapper{

    position:relative;

    display:flex;

    align-items:center;
}

.toggle-password{

    position:absolute;

    right:15px;

    background:none;

    border:none;

    color:#999;

    cursor:pointer;

    transition:0.3s;

    font-size:1rem;
}

.toggle-password:hover{

    color:#ff4500;

    text-shadow:
    0 0 10px #ff4500;
}

    </style>
</head>
<script>

function togglePassword(inputId, button){

    const input = document.getElementById(inputId);

    const icon = button.querySelector('i');

    if(input.type === 'password'){

        input.type = 'text';

        icon.classList.remove('fa-eye');

        icon.classList.add('fa-eye-slash');

    }else{

        input.type = 'password';

        icon.classList.remove('fa-eye-slash');

        icon.classList.add('fa-eye');
    }
}

</script>
<body>

<a href="/" class="volver">
    <i class="fas fa-arrow-left"></i> Volver
</a>

<div class="login-container">

    <div class="login-card">

        <div class="logo">
            <img src="/static/images/LOGO DOJO.png" alt="Dojo Temple">
        </div>

        <h1 class="titulo">
            ENTRAR AL DOJO
        </h1>

        <p class="subtitulo">
            El campo de batalla espera al guerrero.
        </p>

        <form method="POST">

            {% csrf_token %}

            {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <div class="mb-4">

                <label class="form-label">
                    Usuario
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Ingresa tu nombre de guerrero"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Contraseña
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        name="password"
                        id="loginPassword"
                        class="form-control dojo-input"
                        placeholder="Ingresa tu contraseña"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePassword('loginPassword', this)"
                    >

                        <i class="fas fa-eye"></i>

                    </button>

                </div>

            </div>

            <button type="submit" class="btn-dojo">

                <i class="fas fa-fire"></i>
                Iniciar Sesión

            </button>

        </form>

        <div class="registro-link">

            ¿Aún no eres guerrero?

            <a href="{% url 'registro' %}">
                Únete al Dojo
            </a>

        </div>

    </div>

</div>

</body>
</html>
